name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    env:
      MPLBACKEND: Agg  # headless: matplotlib writes PDFs without a display
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install .
      - name: Parser unit test
        run: python3 test/test_parse.py
      - name: Integration tests
        run: bash test/run_tests.sh
