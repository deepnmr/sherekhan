name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write  # create releases and upload assets

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install build
      - name: Build wheel and sdist
        run: python -m build
      - name: Publish artifacts to the release
        env:
          GH_TOKEN: ${{ github.token }}
        # Create the release if the tag was pushed without one, then upload.
        # --clobber lets re-runs replace existing assets.
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || \
            gh release create "$GITHUB_REF_NAME" \
              --title "ShereKhan ${GITHUB_REF_NAME#v}" --generate-notes
          gh release upload "$GITHUB_REF_NAME" dist/*.whl dist/*.tar.gz --clobber
